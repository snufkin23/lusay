name: Build and Release

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23' # Adjust to your project Go version

      - name: Install dependencies
        run: make tidy

      - name: Build Binaries
        run: |
          mkdir -p dist
          # Linux
          GOOS=linux GOARCH=amd64 go build -o dist/lucisay-linux-amd64 cmd/lucisay/main.go
          # macOS (Intel)
          GOOS=darwin GOARCH=amd64 go build -o dist/lucisay-darwin-amd64 cmd/lucisay/main.go
          # macOS (Apple Silicon)
          GOOS=darwin GOARCH=arm64 go build -o dist/lucisay-darwin-arm64 cmd/lucisay/main.go
          # Windows
          GOOS=windows GOARCH=amd64 go build -o dist/lucisay-windows-amd64.exe cmd/lucisay/main.go

      - name: Generate Version Tag
        id: tag
        run: |
          # Use date as version if no tag is present, or we can use commit sha
          VERSION="v$(date +'%Y.%m.%d-%H%M')"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: Release ${{ steps.tag.outputs.version }}
          draft: false
          prerelease: false
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
